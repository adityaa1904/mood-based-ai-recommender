<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodLens — AI Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1614;
      --cream:      #f5f0e8;
      --warm:       #e8dfd0;
      --accent:     #c0622a;
      --accent-soft:#e8945a;
      --muted:      #7a6f65;
      --card-bg:    #fdfaf5;
      --border:     #d9d0c4;
    }

    html, body {
      min-height: 100vh;
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Grain texture overlay ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .tagline {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 2px;
    }

    /* ── Main content ───────────────────────────────────────── */
    main {
      padding: 56px 0 48px;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 56px);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 16px;
      max-width: 600px;
    }

    .headline em {
      font-style: italic;
      color: var(--accent);
    }

    .sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 52px;
      max-width: 460px;
    }

    /* ── Input section ──────────────────────────────────────── */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 520px;
    }

    .input-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--ink);
      background: var(--card-bg);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .input-row:focus-within {
      box-shadow: 4px 4px 0 var(--ink);
    }

    #moodInput {
      flex: 1;
      padding: 16px 20px;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      color: var(--ink);
      min-width: 0;
    }

    #moodInput::placeholder {
      color: var(--border);
    }

    #submitBtn {
      padding: 16px 28px;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #submitBtn:hover { background: var(--accent); }
    #submitBtn:active { transform: scale(0.98); }
    #submitBtn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    /* mood pill suggestions */
    .moods {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .mood-pill {
      padding: 5px 14px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 0;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .mood-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #fff8f4;
    }

    /* ── Result card ────────────────────────────────────────── */
    #result {
      margin-top: 48px;
      max-width: 560px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #result.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .result-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .result-card {
      background: var(--card-bg);
      border: 1.5px solid var(--ink);
      padding: 32px 36px;
      position: relative;
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid var(--warm);
      pointer-events: none;
    }

    .suggestion-line {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      align-items: flex-start;
    }

    .suggestion-line:last-child { margin-bottom: 0; }

    .suggestion-icon {
      font-size: 20px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .suggestion-content {}

    .suggestion-type {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .suggestion-text {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink);
    }

    /* Divider between suggestions */
    .suggestion-divider {
      border: none;
      border-top: 1px solid var(--warm);
      margin: 16px 0;
    }

    /* Raw fallback text */
    .raw-suggestion {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-line;
    }

    /* ── Loading state ──────────────────────────────────────── */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .loading-dots span {
      width: 5px; height: 5px;
      background: var(--cream);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── Error state ────────────────────────────────────────── */
    .error-card {
      background: #fff5f5;
      border: 1.5px solid #e88a8a;
      padding: 20px 24px;
      color: #8b2020;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      padding: 24px 0 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 500px) {
      header { flex-direction: column; gap: 4px; }
      .result-card { padding: 24px 20px; }
      .result-card::before { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── Header ────────────────────────────────────────────── -->
  <header>
    <div class="logo">Vibe<span>Mate</span></div>
    <div class="tagline">AI-Powered Recommender</div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────── -->
  <main>
    <h1 class="headline">
      Tell us how you <em>feel.</em><br/>We'll curate the rest.
    </h1>
    <p class="sub">
      Share your current mood and our AI will suggest the perfect song, movie, and activity to match—or uplift—your spirit.
    </p>

    <!-- Input -->
    <div class="input-section">
      <div class="input-label">Your mood right now</div>
      <div class="input-row">
        <input
          type="text"
          id="moodInput"
          placeholder="e.g. melancholic, hopeful, restless…"
          maxlength="80"
          autocomplete="off"
        />
        <button id="submitBtn" onclick="getMoodSuggestion()">Analyze</button>
      </div>

      <!-- Quick mood pills -->
      <div class="moods">
        <button class="mood-pill" onclick="setMood('happy')">Happy</button>
        <button class="mood-pill" onclick="setMood('sad')">Sad</button>
        <button class="mood-pill" onclick="setMood('anxious')">Anxious</button>
        <button class="mood-pill" onclick="setMood('excited')">Excited</button>
        <button class="mood-pill" onclick="setMood('bored')">Bored</button>
        <button class="mood-pill" onclick="setMood('angry')">Angry</button>
        <button class="mood-pill" onclick="setMood('nostalgic')">Nostalgic</button>
        <button class="mood-pill" onclick="setMood('lonely')">Lonely</button>
      </div>
    </div>

    <!-- Result area -->
    <div id="result"></div>
  </main>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span>Powered by Google Gemini AI</span>
    <a href="/swagger-ui/index.html" target="_blank">API Docs →</a>
  </footer>

</div>

<script>
  // Allow pressing Enter to submit
  document.getElementById('moodInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') getMoodSuggestion();
  });

  // Fill input from pill click
  function setMood(mood) {
    document.getElementById('moodInput').value = mood;
    document.getElementById('moodInput').focus();
  }

  // Parse the AI response into structured lines
  function parseSuggestion(text) {
    const musicMatch  = text.match(/Music:\s*(.+?)(?:\n|$)/i);
    const movieMatch  = text.match(/Movie:\s*(.+?)(?:\n|$)/i);
    const activityMatch = text.match(/Activity:\s*(.+?)(?:\n|$)/i);

    if (musicMatch && movieMatch && activityMatch) {
      return {
        music:    musicMatch[1].trim(),
        movie:    movieMatch[1].trim(),
        activity: activityMatch[1].trim(),
      };
    }
    return null; // fallback: render raw
  }

  // Build the nice card HTML
  function buildCard(suggestion) {
    const parsed = parseSuggestion(suggestion);

    if (parsed) {
      return `
        <div class="result-label">Your Personalized Picks</div>
        <div class="result-card">
          <div class="suggestion-line">
            <div class="suggestion-icon">🎵</div>
            <div class="suggestion-content">
              <div class="suggestion-type">Music</div>
              <div class="suggestion-text">${escapeHtml(parsed.music)}</div>
            </div>
          </div>
          <hr class="suggestion-divider"/>
          <div class="suggestion-line">
            <div class="suggestion-icon">🎬</div>
            <div class="suggestion-content">
              <div class="suggestion-type">Movie</div>
              <div class="suggestion-text">${escapeHtml(parsed.movie)}</div>
            </div>
          </div>
          <hr class="suggestion-divider"/>
          <div class="suggestion-line">
            <div class="suggestion-icon">✦</div>
            <div class="suggestion-content">
              <div class="suggestion-type">Activity</div>
              <div class="suggestion-text">${escapeHtml(parsed.activity)}</div>
            </div>
          </div>
        </div>`;
    }

    // Fallback: show raw text
    return `
      <div class="result-label">Your Recommendation</div>
      <div class="result-card">
        <div class="raw-suggestion">${escapeHtml(suggestion)}</div>
      </div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Main API call function
  async function getMoodSuggestion() {
    const mood = document.getElementById('moodInput').value.trim();
    const resultDiv = document.getElementById('result');
    const btn = document.getElementById('submitBtn');

    // Validate
    if (!mood) {
      resultDiv.innerHTML = `<div class="error-card">Please enter your mood before analyzing.</div>`;
      resultDiv.classList.add('visible');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `<span class="loading-dots"><span></span><span></span><span></span></span>`;
    resultDiv.classList.remove('visible');
    resultDiv.innerHTML = '';

    try {
      const response = await fetch('/api/mood/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mood: mood })
      });

      if (!response.ok) {
        throw new Error(`Server error: ${response.status}`);
      }

      const data = await response.json();

      // Render result
      resultDiv.innerHTML = buildCard(data.suggestion);

      // Trigger animation
      requestAnimationFrame(() => {
        requestAnimationFrame(() => resultDiv.classList.add('visible'));
      });

    } catch (err) {
      resultDiv.innerHTML = `
        <div class="error-card">
          ⚠ Could not reach the server. Make sure the Spring Boot app is running on port 8080.<br/>
          <small style="opacity:0.7;margin-top:6px;display:block;">${err.message}</small>
        </div>`;
      resultDiv.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Analyze';
    }
  }
</script>
</body>
</html>
